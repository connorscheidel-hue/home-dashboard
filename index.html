<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Home Dashboard">
    <title>Home Dashboard</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #0f1729 50%, #0f172a 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        input { font-size: 16px; }
        .loading { text-align: center; padding: 40px; }
        .spinner { border: 4px solid #1e293b; border-top: 4px solid #06b6d4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script>
        class HomeDashboard {
            constructor() {
                // HOME ASSISTANT CONFIG - UPDATE THESE!
                this.haUrl = 'http://localhost:8123';
                this.haToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJlYjAxNjBiMTQyZjE0YzI5OTI4YjYwMGZkMDA1N2ZmZSIsImlhdCI6MTc3MjgyMDU5MCwiZXhwIjoyMDg4MTgwNTkwfQ.CMZu8VerWIuk55ckF9y9ro1uB7BdKCsd6HMYM7svRpU';
                this.isRemote = false; // Set to true if using Nabu Casa
                this.nabuCasaUrl = 'YOUR_NABU_CASA_URL_HERE'; // Fill this in later
                
                this.devices = [];
                this.alerts = [];
                this.automations = [
                    { id: 1, name: '🌅 Morning Routine', enabled: true },
                    { id: 2, name: '🌙 Bedtime - Arm Alarm', enabled: true },
                    { id: 3, name: '🚗 Leave Home - Lock & Arm', enabled: false },
                    { id: 4, name: '🏠 Arrive Home - Disarm', enabled: false },
                ];
                
                this.currentView = 'dashboard';
                this.selectedRoom = 'All';
                this.searchQuery = '';
                this.isHome = true;
                this.isLoading = true;
                this.lastUpdate = new Date();
                
                this.init();
            }
            
            async init() {
                this.render();
                await this.fetchDevicesFromHA();
                setInterval(() => this.updateTime(), 1000);
                setInterval(() => this.fetchDevicesFromHA(), 5000); // Update every 5 seconds
            }
            
            updateTime() {
                const timeEl = document.getElementById('time');
                if (timeEl) {
                    timeEl.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
            }
            
            async fetchDevicesFromHA() {
                try {
                    // Use remote URL if enabled, otherwise local
                    const baseUrl = this.isRemote ? this.nabuCasaUrl : this.haUrl;
                    
                    const response = await fetch(`${baseUrl}/api/states`, {
                        headers: {
                            'Authorization': `Bearer ${this.haToken}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const states = await response.json();
                    this.parseHAStates(states);
                    this.isLoading = false;
                    this.lastUpdate = new Date();
                    this.render();
                } catch (error) {
                    console.error('Error fetching from Home Assistant:', error);
                    this.isLoading = false;
                    this.render();
                }
            }
            
            parseHAStates(states) {
                this.devices = [];
                const deviceMap = {};
                
                // Parse all entities from Home Assistant
                states.forEach(entity => {
                    const entityId = entity.entity_id;
                    const state = entity.state;
                    const attributes = entity.attributes;
                    
                    // Ring Camera
                    if (entityId.includes('ring') && entityId.includes('camera')) {
                        const name = attributes.friendly_name || 'Ring Camera';
                        const room = this.extractRoom(name);
                        
                        if (!deviceMap[name]) {
                            deviceMap[name] = {
                                id: this.devices.length + 1,
                                name: name,
                                room: room,
                                category: 'Camera',
                                status: state === 'on' ? 'online' : 'offline',
                                power: state,
                                battery: attributes.battery_level || null,
                                signal: attributes.wifi_signal_category || 'strong',
                                icon: '📷',
                                entity_id: entityId,
                                lastSeen: 'now',
                            };
                            this.devices.push(deviceMap[name]);
                        }
                    }
                    
                    // Ring Alarm
                    if (entityId.includes('ring') && entityId.includes('alarm')) {
                        const name = attributes.friendly_name || 'Ring Alarm';
                        const room = 'Entryway';
                        
                        if (!deviceMap[name]) {
                            deviceMap[name] = {
                                id: this.devices.length + 1,
                                name: name,
                                room: room,
                                category: 'Security',
                                status: state === 'armed' ? 'online' : 'online',
                                power: 'on',
                                battery: null,
                                signal: 'strong',
                                icon: '🔔',
                                entity_id: entityId,
                                lastSeen: 'now',
                            };
                            this.devices.push(deviceMap[name]);
                        }
                    }
                    
                    // Ring Chime
                    if (entityId.includes('ring') && entityId.includes('chime')) {
                        const name = attributes.friendly_name || 'Ring Chime';
                        const room = 'Laundry Room';
                        
                        if (!deviceMap[name]) {
                            deviceMap[name] = {
                                id: this.devices.length + 1,
                                name: name,
                                room: room,
                                category: 'Audio',
                                status: state === 'on' ? 'online' : 'offline',
                                power: state,
                                battery: null,
                                signal: 'strong',
                                icon: '🔊',
                                entity_id: entityId,
                                lastSeen: 'now',
                            };
                            this.devices.push(deviceMap[name]);
                        }
                    }
                    
                    // Nest/Google devices
                    if (entityId.includes('nest') || entityId.includes('climate')) {
                        const name = attributes.friendly_name || 'Thermostat';
                        const room = this.extractRoom(name);
                        
                        if (!deviceMap[name]) {
                            deviceMap[name] = {
                                id: this.devices.length + 1,
                                name: name,
                                room: room,
                                category: 'Climate',
                                status: 'online',
                                power: 'on',
                                battery: null,
                                signal: 'strong',
                                temp: Math.round(parseFloat(state)) || 72,
                                icon: '🌡️',
                                entity_id: entityId,
                                lastSeen: 'now',
                            };
                            this.devices.push(deviceMap[name]);
                        }
                    }
                });
                
                // If no devices found from HA, use defaults
                if (this.devices.length === 0) {
                    this.devices = [
                        { id: 1, name: 'Ring Camera', room: 'Front Door', category: 'Camera', status: 'online', power: 'on', battery: 85, signal: 'strong', icon: '📷', lastSeen: 'now' },
                        { id: 2, name: 'Ring Alarm', room: 'Entryway', category: 'Security', status: 'online', power: 'on', battery: null, signal: 'strong', icon: '🔔', lastSeen: 'now' },
                        { id: 3, name: 'Ring Chime', room: 'Laundry Room', category: 'Audio', status: 'online', power: 'on', battery: null, signal: 'strong', icon: '🔊', lastSeen: 'now' },
                    ];
                }
            }
            
            extractRoom(name) {
                if (name.includes('front')) return 'Front Door';
                if (name.includes('back')) return 'Backyard';
                if (name.includes('garage')) return 'Garage';
                if (name.includes('kitchen')) return 'Kitchen';
                if (name.includes('bedroom')) return 'Bedroom';
                if (name.includes('living')) return 'Living Room';
                if (name.includes('basement')) return 'Basement';
                return 'Entryway';
            }
            
            getRooms() {
                const rooms = [...new Set(this.devices.map(d => d.room))];
                return ['All', ...rooms].sort();
            }
            
            getStats() {
                const onlineCount = this.devices.filter(d => d.status === 'online').length;
                const offlineCount = this.devices.filter(d => d.status === 'offline').length;
                const lowBattery = this.devices.filter(d => d.battery && d.battery < 30).length;
                return { onlineCount, offlineCount, lowBattery };
            }
            
            getFilteredDevices() {
                let filtered = this.devices;
                if (this.selectedRoom !== 'All') {
                    filtered = filtered.filter(d => d.room === this.selectedRoom);
                }
                if (this.searchQuery) {
                    filtered = filtered.filter(d => d.name.toLowerCase().includes(this.searchQuery.toLowerCase()));
                }
                return filtered;
            }
            
            toggleAutomation(id) {
                const auto = this.automations.find(a => a.id === id);
                if (auto) {
                    auto.enabled = !auto.enabled;
                    this.render();
                }
            }
            
            render() {
                const { onlineCount, offlineCount, lowBattery } = this.getStats();
                
                const html = `
                    <div style="height: 100vh; overflow: hidden; display: flex; flex-direction: column;">
                        <div style="border-bottom: 1px solid #1e293b; padding: 12px 16px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); padding-top: max(12px, env(safe-area-inset-top)); flex-shrink: 0;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <div>
                                    <h1 style="margin: 0; font-size: 18px; font-weight: bold;">Home Dashboard</h1>
                                    <p style="margin: 0; font-size: 12px; color: #94a3b8;">🏠 Connected to HA • <span id="time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></p>
                                </div>
                                <button onclick="app.toggleSearch()" style="background: rgba(30, 41, 59, 0.5); border: none; padding: 8px; border-radius: 8px; color: white; cursor: pointer; font-size: 16px;">🔍</button>
                            </div>
                        </div>
                        
                        <div style="flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px;">
                            ${this.isLoading ? `
                                <div class="loading">
                                    <div class="spinner"></div>
                                    <p style="color: #94a3b8; margin-top: 16px;">Connecting to Home Assistant...</p>
                                </div>
                            ` : `
                                ${this.currentView === 'dashboard' ? this.renderDashboard(onlineCount, offlineCount, lowBattery) : ''}
                                ${this.currentView === 'automations' ? this.renderAutomations() : ''}
                                ${this.currentView === 'alerts' ? this.renderAlerts() : ''}
                                ${this.currentView === 'settings' ? this.renderSettings() : ''}
                            `}
                        </div>
                        
                        <div style="position: fixed; bottom: 0; left: 0; right: 0; border-top: 1px solid #1e293b; background: rgba(15, 23, 42, 0.95); display: flex; justify-content: space-around; flex-shrink: 0; padding-bottom: max(16px, env(safe-area-inset-bottom));">
                            <button onclick="app.setView('dashboard')" style="flex: 1; text-align: center; padding: 12px; background: none; border: none; color: ${this.currentView === 'dashboard' ? '#06b6d4' : '#64748b'}; cursor: pointer; font-size: 12px; font-weight: bold;">📊<br>Dashboard</button>
                            <button onclick="app.setView('automations')" style="flex: 1; text-align: center; padding: 12px; background: none; border: none; color: ${this.currentView === 'automations' ? '#06b6d4' : '#64748b'}; cursor: pointer; font-size: 12px; font-weight: bold;">⚙️<br>Auto</button>
                            <button onclick="app.setView('alerts')" style="flex: 1; text-align: center; padding: 12px; background: none; border: none; color: ${this.currentView === 'alerts' ? '#06b6d4' : '#64748b'}; cursor: pointer; font-size: 12px; font-weight: bold;">🔔<br>Alerts</button>
                            <button onclick="app.setView('settings')" style="flex: 1; text-align: center; padding: 12px; background: none; border: none; color: ${this.currentView === 'settings' ? '#06b6d4' : '#64748b'}; cursor: pointer; font-size: 12px; font-weight: bold;">⚙️<br>Settings</button>
                        </div>
                    </div>
                `;
                document.getElementById('root').innerHTML = html;
            }
            
            renderDashboard(onlineCount, offlineCount, lowBattery) {
                const filtered = this.getFilteredDevices();
                return `
                    <div style="margin-bottom: 24px;">
                        <h2 style="font-size: 14px; font-weight: bold; margin: 0 0 12px 0; color: #94a3b8; text-transform: uppercase;">STATUS</h2>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                            <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px;">
                                <p style="margin: 0; font-size: 11px; color: #94a3b8; text-transform: uppercase;">Total</p>
                                <p style="margin: 8px 0 0 0; font-size: 24px; font-weight: bold;">${this.devices.length}</p>
                                <p style="margin: 4px 0 0 0; font-size: 11px; color: #10b981;">✓ ${onlineCount} online</p>
                            </div>
                            <div style="background: ${offlineCount > 0 ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)'}; border: 1px solid ${offlineCount > 0 ? '#ef4444' : '#10b981'}; border-radius: 8px; padding: 12px;">
                                <p style="margin: 0; font-size: 11px; color: ${offlineCount > 0 ? '#fca5a5' : '#a7f3d0'}; text-transform: uppercase;">Network</p>
                                <p style="margin: 8px 0 0 0; font-size: 24px; font-weight: bold; color: ${offlineCount > 0 ? '#ef4444' : '#10b981'};">${offlineCount > 0 ? '⚠️' : '✓'}</p>
                                <p style="margin: 4px 0 0 0; font-size: 11px; color: ${offlineCount > 0 ? '#fca5a5' : '#a7f3d0'};">${offlineCount} offline</p>
                            </div>
                        </div>
                        ${lowBattery > 0 ? `
                            <div style="background: rgba(245, 158, 11, 0.1); border: 1px solid #f59e0b; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
                                <p style="margin: 0; font-size: 11px; color: #fcd34d; text-transform: uppercase;">⚠️ Low Battery</p>
                                <p style="margin: 4px 0 0 0; font-size: 12px; color: #fcd34d;">${lowBattery} device${lowBattery > 1 ? 's' : ''} below 30%</p>
                            </div>
                        ` : ''}
                        <div style="background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; border-radius: 8px; padding: 12px;">
                            <p style="margin: 0; font-size: 11px; color: #93c5fd; text-transform: uppercase;">Last Updated</p>
                            <p style="margin: 4px 0 0 0; font-size: 12px; color: #3b82f6;">${this.lastUpdate.toLocaleTimeString()}</p>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 16px;">
                        <h3 style="font-size: 12px; font-weight: bold; margin: 0 0 8px 0; color: #94a3b8; text-transform: uppercase;">Rooms</h3>
                        <div style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px;">
                            ${this.getRooms().map(room => `
                                <button onclick="app.selectRoom('${room}')" style="padding: 6px 12px; background: ${this.selectedRoom === room ? '#06b6d4' : '#1e293b'}; color: ${this.selectedRoom === room ? '#0f172a' : '#cbd5e1'}; border: 1px solid ${this.selectedRoom === room ? '#06b6d4' : '#334155'}; border-radius: 20px; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer;">${room}</button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 16px;">
                        <input type="text" placeholder="Search..." id="search" style="width: 100%; padding: 8px 12px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 14px;" onkeyup="app.setSearch(this.value)">
                    </div>
                    
                    <div>
                        <h3 style="font-size: 12px; font-weight: bold; margin: 0 0 12px 0; color: #94a3b8; text-transform: uppercase;">Devices (${filtered.length})</h3>
                        ${filtered.map((device, idx) => `
                            <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
                                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                                    <div style="flex: 1;">
                                        <h4 style="margin: 0; font-size: 13px; font-weight: bold;">${device.icon} ${device.name}</h4>
                                        <p style="margin: 4px 0 0 0; font-size: 11px; color: #94a3b8;">${device.room}</p>
                                    </div>
                                    <span style="font-size: 14px;">${device.status === 'online' ? '📡' : '❌'}</span>
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                                    <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                        <p style="margin: 0; font-size: 10px; color: #64748b; text-transform: uppercase;">Status</p>
                                        <p style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; color: ${device.status === 'online' ? '#10b981' : '#ef4444'};">${device.status === 'online' ? '✓' : '✕'}</p>
                                    </div>
                                    <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                        <p style="margin: 0; font-size: 10px; color: #64748b; text-transform: uppercase;">Category</p>
                                        <p style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; color: #3b82f6;">${device.category}</p>
                                    </div>
                                    ${device.battery ? `
                                        <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                            <p style="margin: 0; font-size: 10px; color: #64748b; text-transform: uppercase;">Battery</p>
                                            <p style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; color: ${device.battery > 50 ? '#10b981' : device.battery > 20 ? '#f59e0b' : '#ef4444'};">${device.battery}%</p>
                                        </div>
                                    ` : ''}
                                    ${device.temp ? `
                                        <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                            <p style="margin: 0; font-size: 10px; color: #64748b; text-transform: uppercase;">Temp</p>
                                            <p style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; color: #f97316;">${device.temp}°F</p>
                                        </div>
                                    ` : ''}
                                    ${device.signal ? `
                                        <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                            <p style="margin: 0; font-size: 10px; color: #64748b; text-transform: uppercase;">Signal</p>
                                            <p style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; color: #06b6d4;">${device.signal === 'strong' ? '▓▓▓' : '▓▓▒'}</p>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            renderAutomations() {
                return `
                    <h2 style="font-size: 14px; font-weight: bold; margin: 0 0 16px 0; color: #94a3b8; text-transform: uppercase;">Automations</h2>
                    ${this.automations.map(auto => `
                        <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h4 style="margin: 0; font-size: 13px; font-weight: bold;">${auto.name}</h4>
                                <button onclick="app.toggleAutomation(${auto.id})" style="padding: 4px 12px; background: ${auto.enabled ? 'rgba(16, 185, 129, 0.2)' : 'rgba(30, 41, 59, 0.5)'}; color: ${auto.enabled ? '#10b981' : '#94a3b8'}; border: 1px solid ${auto.enabled ? '#10b981' : '#334155'}; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase;">${auto.enabled ? 'ON' : 'OFF'}</button>
                            </div>
                        </div>
                    `).join('')}
                `;
            }
            
            renderAlerts() {
                return `
                    <h2 style="font-size: 14px; font-weight: bold; margin: 0 0 16px 0; color: #94a3b8; text-transform: uppercase;">Alerts</h2>
                    <div style="text-align: center; padding: 64px 16px;">
                        <p style="font-size: 48px; margin-bottom: 16px;">✅</p>
                        <p style="color: #10b981; font-weight: bold; font-size: 16px;">All Clear!</p>
                        <p style="color: #64748b; font-size: 12px;">No alerts right now</p>
                    </div>
                `;
            }
            
            renderSettings() {
                return `
                    <h2 style="font-size: 14px; font-weight: bold; margin: 0 0 16px 0; color: #94a3b8; text-transform: uppercase;">Settings</h2>
                    <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
                        <h4 style="margin: 0 0 8px 0; font-weight: bold; font-size: 13px;">Home Assistant Connection</h4>
                        <div style="font-size: 12px; color: #94a3b8; line-height: 1.8;">
                            <p style="margin: 0;">URL: ${this.haUrl}</p>
                            <p style="margin: 4px 0 0 0;">Mode: ${this.isRemote ? 'Remote (Nabu Casa)' : 'Local Network'}</p>
                            <p style="margin: 4px 0 0 0;">Status: ✓ Connected</p>
                        </div>
                    </div>
                    <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px;">
                        <h4 style="margin: 0 0 12px 0; font-weight: bold; font-size: 13px;">System Status</h4>
                        <div style="font-size: 12px; color: #94a3b8; line-height: 2;">
                            <p style="margin: 0;">✓ Home Assistant: Running</p>
                            <p style="margin: 0;">✓ Ring Integration: Connected</p>
                            <p style="margin: 0;">✓ Internet: Connected</p>
                        </div>
                    </div>
                `;
            }
            
            setView(view) {
                this.currentView = view;
                this.render();
            }
            
            selectRoom(room) {
                this.selectedRoom = room;
                this.searchQuery = '';
                this.render();
            }
            
            setSearch(query) {
                this.searchQuery = query;
                this.render();
            }
            
            toggleSearch() {
                const input = document.getElementById('search');
                if (input) input.focus();
            }
        }
        
        const app = new HomeDashboard();
    </script>
</body>
</html>
