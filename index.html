<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Home Dashboard">
    <title>Home Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #0f1729 50%, #0f172a 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        input { font-size: 16px; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script>
        // Home Dashboard App - Complete Vanilla JS (No React needed!)
        
        class HomeDashboard {
            constructor() {
                this.devices = [
                    { id: 1, name: 'Ring Camera', room: 'Living Room', status: 'online', power: 'on', battery: 95, signal: 'strong' },
                    { id: 2, name: 'Living Room TV', room: 'Living Room', status: 'online', power: 'off', battery: null, signal: 'strong' },
                    { id: 3, name: 'Living Room Lights', room: 'Living Room', status: 'online', power: 'on', battery: null, signal: 'strong' },
                    { id: 4, name: 'Google Cam (Living Room)', room: 'Living Room', status: 'online', power: 'on', battery: null, signal: 'strong' },
                    { id: 5, name: 'Nest Thermostat', room: 'Bedroom', status: 'online', power: 'on', battery: 87, signal: 'strong', temp: 72 },
                    { id: 6, name: 'Bedroom Hatch', room: 'Bedroom', status: 'online', power: 'on', battery: 60, signal: 'medium' },
                    { id: 7, name: 'Bedroom Google Home', room: 'Bedroom', status: 'online', power: 'on', battery: null, signal: 'strong' },
                    { id: 8, name: 'Bedroom TV', room: 'Bedroom', status: 'online', power: 'off', battery: null, signal: 'strong' },
                    { id: 9, name: 'Kitchen Google Home', room: 'Kitchen', status: 'online', power: 'on', battery: null, signal: 'strong' },
                    { id: 10, name: 'Fridge Sensor', room: 'Kitchen', status: 'online', power: 'on', battery: 88, signal: 'strong', temp: 38 },
                    { id: 11, name: 'Kitchen Lights', room: 'Kitchen', status: 'online', power: 'off', battery: null, signal: 'strong' },
                    { id: 12, name: 'Sump Water Sensor', room: 'Basement', status: 'online', power: 'on', battery: 78, signal: 'medium' },
                    { id: 13, name: 'Basement Humidity', room: 'Basement', status: 'online', power: 'on', battery: 82, signal: 'medium', humidity: 62 },
                    { id: 14, name: 'Sump Pump', room: 'Basement', status: 'online', power: 'off', battery: null, signal: 'strong' },
                    { id: 15, name: 'Guest Room Google Home', room: 'Guest Room', status: 'offline', power: 'unknown', battery: null, signal: null },
                    { id: 16, name: 'Guest Room Lights', room: 'Guest Room', status: 'online', power: 'off', battery: null, signal: 'strong' },
                ];
                
                this.alerts = [
                    { id: 1, device: 'Guest Room Google Home', message: 'Offline for 2 hours', severity: 'high' },
                    { id: 2, device: 'Bedroom Hatch', message: 'Battery at 60%', severity: 'medium' },
                ];
                
                this.automations = [
                    { id: 1, name: 'Morning Routine', enabled: true },
                    { id: 2, name: 'Bedtime', enabled: true },
                    { id: 3, name: 'Leave Home', enabled: false },
                ];
                
                this.currentView = 'dashboard';
                this.selectedRoom = 'All';
                this.searchQuery = '';
                this.isHome = true;
                
                this.init();
            }
            
            init() {
                this.render();
                setInterval(() => this.updateTime(), 1000);
            }
            
            updateTime() {
                const timeEl = document.getElementById('time');
                if (timeEl) {
                    timeEl.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
            }
            
            getRooms() {
                const rooms = [...new Set(this.devices.map(d => d.room))];
                return ['All', ...rooms].sort();
            }
            
            getFilteredDevices() {
                let filtered = this.devices;
                if (this.selectedRoom !== 'All') {
                    filtered = filtered.filter(d => d.room === this.selectedRoom);
                }
                if (this.searchQuery) {
                    filtered = filtered.filter(d => d.name.toLowerCase().includes(this.searchQuery.toLowerCase()));
                }
                return filtered;
            }
            
            toggleDevice(id) {
                const device = this.devices.find(d => d.id === id);
                if (device && device.power !== 'unknown') {
                    device.power = device.power === 'on' ? 'off' : 'on';
                    this.render();
                }
            }
            
            toggleAutomation(id) {
                const auto = this.automations.find(a => a.id === id);
                if (auto) {
                    auto.enabled = !auto.enabled;
                    this.render();
                }
            }
            
            dismissAlert(id) {
                this.alerts = this.alerts.filter(a => a.id !== id);
                this.render();
            }
            
            render() {
                const onlineCount = this.devices.filter(d => d.status === 'online').length;
                const offlineCount = this.devices.filter(d => d.status === 'offline').length;
                
                const html = `
                    <div style="height: 100vh; overflow: hidden; display: flex; flex-direction: column; background: linear-gradient(135deg, #0f172a 0%, #0f1729 50%, #0f172a 100%);">
                        <!-- Header -->
                        <div style="border-bottom: 1px solid #1e293b; padding: 12px 16px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); padding-top: max(12px, env(safe-area-inset-top));">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <div>
                                    <h1 style="margin: 0; font-size: 18px; font-weight: bold;">Home Dashboard</h1>
                                    <p style="margin: 0; font-size: 12px; color: #94a3b8;">${this.isHome ? '🏠 At Home' : '📍 Away'} • <span id="time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></p>
                                </div>
                                <button onclick="app.toggleSearch()" style="background: rgba(30, 41, 59, 0.5); border: none; padding: 8px; border-radius: 8px; color: white; cursor: pointer;">🔍</button>
                            </div>
                        </div>
                        
                        <!-- Main Content -->
                        <div style="flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px;">
                            ${this.currentView === 'dashboard' ? this.renderDashboard(onlineCount, offlineCount) : ''}
                            ${this.currentView === 'automations' ? this.renderAutomations() : ''}
                            ${this.currentView === 'alerts' ? this.renderAlerts() : ''}
                            ${this.currentView === 'settings' ? this.renderSettings() : ''}
                        </div>
                        
                        <!-- Bottom Navigation -->
                        <div style="position: fixed; bottom: 0; left: 0; right: 0; border-top: 1px solid #1e293b; background: rgba(15, 23, 42, 0.95); display: flex; justify-content: space-around; padding-bottom: max(16px, env(safe-area-inset-bottom));">
                            <button onclick="app.setView('dashboard')" style="flex: 1; text-align: center; padding: 12px; background: none; border: none; color: ${this.currentView === 'dashboard' ? '#06b6d4' : '#64748b'}; cursor: pointer; font-size: 12px; font-weight: bold;">📊 Dashboard</button>
                            <button onclick="app.setView('automations')" style="flex: 1; text-align: center; padding: 12px; background: none; border: none; color: ${this.currentView === 'automations' ? '#06b6d4' : '#64748b'}; cursor: pointer; font-size: 12px; font-weight: bold;">⚙️ Auto</button>
                            <button onclick="app.setView('alerts')" style="flex: 1; text-align: center; padding: 12px; background: none; border: none; color: ${this.currentView === 'alerts' ? '#06b6d4' : '#64748b'}; cursor: pointer; font-size: 12px; font-weight: bold;">🔔 Alerts ${this.alerts.length > 0 ? `(${this.alerts.length})` : ''}</button>
                            <button onclick="app.setView('settings')" style="flex: 1; text-align: center; padding: 12px; background: none; border: none; color: ${this.currentView === 'settings' ? '#06b6d4' : '#64748b'}; cursor: pointer; font-size: 12px; font-weight: bold;">⚙️ Settings</button>
                        </div>
                    </div>
                `;
                document.getElementById('root').innerHTML = html;
            }
            
            renderDashboard(onlineCount, offlineCount) {
                const filtered = this.getFilteredDevices();
                return `
                    <div style="margin-bottom: 24px;">
                        <h2 style="font-size: 16px; font-weight: bold; margin-bottom: 12px;">Status</h2>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                            <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px;">
                                <p style="margin: 0; font-size: 12px; color: #94a3b8;">Total Devices</p>
                                <p style="margin: 8px 0 0 0; font-size: 28px; font-weight: bold;">${this.devices.length}</p>
                                <p style="margin: 4px 0 0 0; font-size: 12px; color: #94a3b8;">${onlineCount} online</p>
                            </div>
                            <div style="background: ${offlineCount > 0 ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)'}; border: 1px solid ${offlineCount > 0 ? '#ef4444' : '#10b981'}; border-radius: 8px; padding: 16px;">
                                <p style="margin: 0; font-size: 12px; color: ${offlineCount > 0 ? '#f87171' : '#6ee7b7'};">Network</p>
                                <p style="margin: 8px 0 0 0; font-size: 28px; font-weight: bold; color: ${offlineCount > 0 ? '#ef4444' : '#10b981'};">${offlineCount > 0 ? '⚠️' : '✓'}</p>
                                <p style="margin: 4px 0 0 0; font-size: 12px; color: ${offlineCount > 0 ? '#fca5a5' : '#a7f3d0'};">${offlineCount} offline</p>
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 16px;">
                        <h3 style="font-size: 14px; font-weight: bold; margin-bottom: 8px;">Rooms</h3>
                        <div style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px;">
                            ${this.getRooms().map(room => `
                                <button onclick="app.selectRoom('${room}')" style="padding: 6px 12px; background: ${this.selectedRoom === room ? '#06b6d4' : '#1e293b'}; color: ${this.selectedRoom === room ? '#0f172a' : '#cbd5e1'}; border: none; border-radius: 20px; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer;">${room}</button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 16px;">
                        <input type="text" placeholder="Search devices..." id="search" style="width: 100%; padding: 8px 12px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 14px;" onkeyup="app.setSearch(this.value)">
                    </div>
                    
                    <div>
                        <h3 style="font-size: 14px; font-weight: bold; margin-bottom: 12px;">Devices (${filtered.length})</h3>
                        ${filtered.map((device, idx) => `
                            <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-bottom: 12px; animation: fadeIn 0.4s ease-out; animation-delay: ${idx * 50}ms;">
                                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                                    <div>
                                        <h4 style="margin: 0; font-size: 14px; font-weight: bold; color: white;">${device.name}</h4>
                                        <p style="margin: 4px 0 0 0; font-size: 12px; color: #94a3b8;">${device.room}</p>
                                    </div>
                                    <span style="font-size: 16px;">${device.status === 'online' ? '📡' : '❌'}</span>
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                                    <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                        <p style="margin: 0; font-size: 11px; color: #64748b;">Status</p>
                                        <p style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; color: ${device.status === 'online' ? '#10b981' : '#ef4444'};">${device.status}</p>
                                    </div>
                                    <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                        <p style="margin: 0; font-size: 11px; color: #64748b;">Power</p>
                                        <button onclick="app.toggleDevice(${device.id})" style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; background: none; border: none; color: #3b82f6; cursor: pointer;">${device.power}</button>
                                    </div>
                                    ${device.battery ? `
                                        <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                            <p style="margin: 0; font-size: 11px; color: #64748b;">Battery</p>
                                            <p style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; color: ${device.battery > 50 ? '#10b981' : device.battery > 20 ? '#f59e0b' : '#ef4444'};">${device.battery}%</p>
                                        </div>
                                    ` : ''}
                                    ${device.temp ? `
                                        <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                            <p style="margin: 0; font-size: 11px; color: #64748b;">Temp</p>
                                            <p style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; color: #f97316;">${device.temp}°F</p>
                                        </div>
                                    ` : ''}
                                    ${device.humidity ? `
                                        <div style="background: #0f172a; border-radius: 6px; padding: 8px;">
                                            <p style="margin: 0; font-size: 11px; color: #64748b;">Humidity</p>
                                            <p style="margin: 4px 0 0 0; font-size: 12px; font-weight: bold; color: #3b82f6;">${device.humidity}%</p>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            renderAutomations() {
                return `
                    <h2 style="font-size: 18px; font-weight: bold; margin-bottom: 16px;">Automations</h2>
                    ${this.automations.map(auto => `
                        <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h4 style="margin: 0; font-size: 14px; font-weight: bold;">${auto.name}</h4>
                                <button onclick="app.toggleAutomation(${auto.id})" style="padding: 6px 12px; background: ${auto.enabled ? 'rgba(16, 185, 129, 0.2)' : 'rgba(30, 41, 59, 0.5)'}; color: ${auto.enabled ? '#10b981' : '#94a3b8'}; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer;">${auto.enabled ? 'ON' : 'OFF'}</button>
                            </div>
                        </div>
                    `).join('')}
                `;
            }
            
            renderAlerts() {
                if (this.alerts.length === 0) {
                    return `<div style="text-align: center; padding: 48px 16px;"><p style="font-size: 32px; margin-bottom: 12px;">✅</p><p style="color: #10b981; font-weight: bold;">All Clear!</p><p style="color: #64748b; font-size: 12px;">No alerts right now</p></div>`;
                }
                return `
                    <h2 style="font-size: 18px; font-weight: bold; margin-bottom: 16px;">Alerts</h2>
                    ${this.alerts.map(alert => `
                        <div style="background: ${alert.severity === 'high' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(245, 158, 11, 0.1)'}; border: 1px solid ${alert.severity === 'high' ? '#ef4444' : '#f59e0b'}; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div>
                                    <h4 style="margin: 0; font-weight: bold;">${alert.device}</h4>
                                    <p style="margin: 4px 0 0 0; font-size: 12px; color: #94a3b8;">${alert.message}</p>
                                </div>
                                <button onclick="app.dismissAlert(${alert.id})" style="background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px;">✕</button>
                            </div>
                        </div>
                    `).join('')}
                `;
            }
            
            renderSettings() {
                return `
                    <h2 style="font-size: 18px; font-weight: bold; margin-bottom: 16px;">Settings</h2>
                    <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h4 style="margin: 0; font-weight: bold;">Location</h4>
                                <p style="margin: 4px 0 0 0; font-size: 12px; color: #94a3b8;">Currently: ${this.isHome ? 'At Home' : 'Away'}</p>
                            </div>
                            <button onclick="app.toggleLocation()" style="padding: 8px 16px; background: ${this.isHome ? 'rgba(16, 185, 129, 0.2)' : 'rgba(30, 41, 59, 0.5)'}; color: ${this.isHome ? '#10b981' : '#94a3b8'}; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer;">${this.isHome ? '🏠 Home' : '📍 Away'}</button>
                        </div>
                    </div>
                    <div style="background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; margin-top: 16px;">
                        <h4 style="margin: 0 0 12px 0; font-weight: bold;">Hub Status</h4>
                        <div style="font-size: 12px; color: #94a3b8; line-height: 1.8;">
                            <p style="margin: 0;">✓ Smart Home Hub: Connected</p>
                            <p style="margin: 4px 0 0 0;">✓ Internet: 98.7 Mbps</p>
                            <p style="margin: 4px 0 0 0;">✓ WiFi: Strong Signal</p>
                        </div>
                    </div>
                `;
            }
            
            setView(view) {
                this.currentView = view;
                this.render();
            }
            
            selectRoom(room) {
                this.selectedRoom = room;
                this.render();
            }
            
            setSearch(query) {
                this.searchQuery = query;
                this.render();
            }
            
            toggleSearch() {
                const input = document.getElementById('search');
                if (input) {
                    input.focus();
                }
            }
            
            toggleLocation() {
                this.isHome = !this.isHome;
                this.render();
            }
        }
        
        const app = new HomeDashboard();
    </script>
</body>
</html>
